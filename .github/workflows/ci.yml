# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
