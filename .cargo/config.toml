[alias]
artesian-build = ["build", "--workspace", "--all-features"]
artesian-clippy = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]
artesian-test = ["test", "--workspace", "--all-features"]

[env]
CFLAGS = { value = "-DSQLITE_VEC_ENABLE_DISKANN=0 -DSQLITE_VEC_ENABLE_RESCORE=0", force = false }
