# SPDX-License-Identifier: Apache-2.0
# Docs site (starter). Install: pip install mkdocs-material. Run: mkdocs serve.
# Nav is intentionally minimal and is finalized during the documentation sweep.
site_name: Artesian
site_description: Memory control plane for agent loops.
site_url: https://aquifer-labs.github.io/artesian/
repo_url: https://github.com/aquifer-labs/artesian
repo_name: aquifer-labs/artesian
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle: { icon: material/weather-sunny, name: Switch to light mode }

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Start:
      - Onboarding: onboarding.md
      - Why Artesian: positioning.md
      - Why Rust: why-rust.md
      - Roadmap: roadmap.md
  - Concepts:
      - Architecture: architecture.md
      - Modes: modes.md
      - Composability (LEGO): composability.md
      - Context tree: context-tree.md
      - Self-repair: self-repair.md
  - Memory:
      - Memory model: memory.md
      - Backends: backends.md
      - Loop engineering: loop-engineering.md
      - Kit format: kit-format.md
      - ACC benchmark: acc-bench.md
  - Orchestration:
      - Orchestration: orchestration.md
      - Teams: teams.md
      - Task tracking: task-tracking.md
      - Concurrency: concurrency.md
  - Operations:
      - Upgrades: upgrades.md
      - Development: development.md
